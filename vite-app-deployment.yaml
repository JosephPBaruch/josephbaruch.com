apiVersion: apps/v1
kind: Deployment
metadata:
  name: vite-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vite-app
  template:
    metadata:
      labels:
        app: vite-app
    spec:
      containers:
        - name: vite-app-container
          image: your-vite-image:latest  # This image will be imported into k3d
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: vite-app-service
spec:
  type: NodePort
  selector:
    app: vite-app
  ports:
    - port: 3000
      nodePort: 30001  # NodePort for external access
      protocol: TCP
